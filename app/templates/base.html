<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ brand_name }}{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --pico-font-size: 16px;
    }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }
    .container { max-width: 1100px; margin: 0 auto; padding: 1rem; }
    .brand { font-weight: 700; color: var(--pico-primary); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--pico-card-background-color); border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: 1rem; text-align: center; }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--pico-primary); }
    .stat-card .label { font-size: 0.85rem; color: var(--pico-muted-color); }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--pico-muted-border-color); margin-bottom: 1.5rem; }
    .tabs a { padding: 0.75rem 1.25rem; text-decoration: none; color: var(--pico-muted-color); border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 500; }
    .tabs a.active { color: var(--pico-primary); border-bottom-color: var(--pico-primary); }
    .tabs a:hover { color: var(--pico-primary); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; }
    .badge-success { background: #d4edda; color: #155724; }
    .badge-warning { background: #fff3cd; color: #856404; }
    .badge-danger { background: #f8d7da; color: #721c24; }
    .badge-info { background: #d1ecf1; color: #0c5460; }
    .tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.7rem; background: var(--pico-primary-focus); color: var(--pico-primary); margin-right: 0.25rem; }
    footer { text-align: center; padding: 1rem; color: var(--pico-muted-color); font-size: 0.85rem; }
    .alert { padding: 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-error { background: #f8d7da; color: #721c24; }
    .preview-pane { border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: 1rem; min-height: 200px; background: white; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
    table { width: 100%; }
    .action-btn { padding: 0.25rem 0.5rem; font-size: 0.8rem; cursor: pointer; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}
  <header class="container">
    {% block header %}{% endblock %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>&copy; {{ brand_name }} — Self-hosted Newsletter Service</p>
  </footer>
  {% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
