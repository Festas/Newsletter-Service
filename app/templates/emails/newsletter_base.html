<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#f4f4f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;">
    <tr>
      <td align="center" style="padding:2rem 1rem;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; background:#ffffff; border-radius:8px; overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:#1095c1; padding:1.25rem 2rem; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:1.15rem; font-weight:600;">{{ brand_name }}</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:2rem; font-size:1rem; line-height:1.7; color:#333;">
              {{ body_html | safe }}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:1rem 2rem; background:#f9f9f9; text-align:center; font-size:0.8rem; color:#999; border-top:1px solid #eee;">
              <p style="margin:0 0 0.5rem;">{{ brand_name }}</p>
              <p style="margin:0;">
                <a href="{{ unsubscribe_url }}" style="color:#999; text-decoration:underline;">Unsubscribe</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
  {% if tracking_pixel_url %}
  <img src="{{ tracking_pixel_url }}" width="1" height="1" alt="" style="display:none;">
  {% endif %}
</body>
</html>
